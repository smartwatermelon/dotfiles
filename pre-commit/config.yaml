---
repos:
  # Python formatting and linting (installed via GitHub repos)
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        name: "Python Formatter (black)"
        args: [--quiet]
        verbose: true

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        name: "Python Lint (flake8)"
        additional_dependencies: [flake8-bugbear]

  # Shell linting and formatting using global script
  - repo: local
    hooks:
      - id: shell-lint-fix
        name: Shell Scripts Lint & Auto-Fix with Summary
        entry: bash -c '$HOME/.config/git/hooks/lint-shell.sh "$@"' --
        language: system
        types: [shell]
        pass_filenames: true
        verbose: true

  # YAML linting
  - repo: local
    hooks:
      - id: yamllint
        name: "YAML Lint (yamllint)"
        entry: yamllint
        language: system
        types: [yaml]
        pass_filenames: true
        verbose: true

  # HTML validation via tidy
  - repo: local
    hooks:
      - id: html-tidy
        name: "HTML Validation (tidy)"
        entry: bash -c 'tidy -q -e -config "$HOME/.config/tidy/tidyrc" "$@"' --
        language: system
        types: [html]
        pass_filenames: true
        verbose: true

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        name: markdownlint (fix)
        entry: markdownlint --fix
        language: node
        types: [markdown]
        verbose: true
        args: ["--config", "~/.config/markdownlint-cli/.markdownlint.json"]

  # Prettier formatting for JavaScript/TypeScript/JSON/CSS
  # Note: Markdown excluded - handled by markdownlint above
  - repo: local
    hooks:
      - id: prettier
        name: "Prettier Formatter (JS/TS/JSON/CSS)"
        entry: bash -c 'npx prettier --write --ignore-unknown "$@"' --
        language: system
        files: \.(js|jsx|ts|tsx|json|css)$
        pass_filenames: true
        verbose: true
